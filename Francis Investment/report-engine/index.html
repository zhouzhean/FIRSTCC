<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Francis Investment · 报告引擎</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 40 40'><rect x='2' y='2' width='36' height='36' rx='8' fill='%23b8942c'/><text x='20' y='27' text-anchor='middle' font-family='Georgia,serif' font-weight='bold' font-size='22' fill='white'>FI</text></svg>">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="app">
  <!-- Toolbar -->
  <div id="toolbar">
    <div class="toolbar-left">
      <svg class="toolbar-logo" viewBox="0 0 44 44" width="38" height="38">
        <defs>
          <linearGradient id="logoGradH" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#d4a843"/>
            <stop offset="50%" style="stop-color:#b8942c"/>
            <stop offset="100%" style="stop-color:#8b6914"/>
          </linearGradient>
          <filter id="logoGlow">
            <feDropShadow dx="0" dy="0" stdDeviation="1" flood-color="#b8942c" flood-opacity="0.3"/>
          </filter>
        </defs>
        <rect x="3" y="3" width="38" height="38" rx="9" fill="url(#logoGradH)" filter="url(#logoGlow)"/>
        <rect x="3" y="3" width="38" height="38" rx="9" fill="none" stroke="#fff" stroke-opacity="0.2" stroke-width="1.5"/>
        <text x="22" y="30" text-anchor="middle" font-family="Georgia,'Times New Roman',serif" font-weight="bold" font-size="23" fill="#fff" letter-spacing="1">FI</text>
      </svg>
      <div class="toolbar-title-wrap">
        <span class="toolbar-title">Francis <span class="accent">Investment</span></span>
        <span id="toolbar-date" class="toolbar-date">2026年5月15日</span>
      </div>
    </div>
    <div class="toolbar-right">
      <div id="ai-status-badge" style="display:flex;align-items:center;gap:8px;padding:5px 14px;border-radius:20px;font-size:12px;font-weight:600;background:#f0fdf4;border:1px solid #bbf7d0;color:#166534;white-space:nowrap;">
        <span id="ai-status-dot" style="width:8px;height:8px;border-radius:50%;background:#16a34a;animation:pulse-dot 2s infinite;"></span>
        <span id="ai-status-label">量化交易 · 就绪</span>
      </div>
      <a id="btn-think-tank" class="btn btn-outline" href="/think-tank.html" target="_blank" title="打开AI思考舱 — 实时监盘与量化分析可视化" style="color:#00d4ff;border-color:#00d4ff;font-weight:bold;text-decoration:none;">&#9678; AI 思考舱</a>
    </div>
  </div>

  <div id="pipeline-progress" style="display:none;background:#0a1628;color:#b8942c;padding:8px 16px;font-size:13px;border-bottom:2px solid #b8942c;">
    <span id="pipeline-step">正在初始化...</span>
    <div style="display:inline-block;width:200px;height:4px;background:#1e3050;border-radius:2px;margin-left:12px;vertical-align:middle;">
      <div id="pipeline-bar" style="height:100%;width:0%;background:linear-gradient(90deg,#b8942c,#d4a843);border-radius:2px;transition:width 0.3s;"></div>
    </div>
    <span id="pipeline-pct" style="margin-left:8px;color:#94a3b8;">0%</span>
  </div>

  <!-- Mobile top bar (hidden on desktop, replaces sidebar on mobile) -->
  <div id="mobile-top-bar">
    <div id="date-strip"></div>
    <div id="section-tabs"></div>
  </div>

  <!-- Main layout: Sidebar + Content -->
  <div id="main-layout">

    <!-- ====== SIDEBAR ====== -->
    <div id="sidebar">

      <!-- Compact Calendar -->
      <div id="calendar-widget"></div>

      <!-- Section Navigation -->
      <div id="section-nav">
        <div class="section-nav-title">核心面板</div>
        <div class="section-nav-list" id="section-nav-list">
          <div class="section-nav-item active" data-section="simfolio">
            <span class="section-nav-dot"></span>
            <span class="section-nav-label">模拟交易</span>
            <span id="nav-simfolio-badge" style="margin-left:auto;font-size:10px;padding:2px 8px;border-radius:10px;background:#fef3c7;color:#92400e;display:none;">LIVE</span>
          </div>
          <div class="section-nav-item" data-section="newsPolicy">
            <span class="section-nav-dot"></span>
            <span class="section-nav-label">时政要点</span>
          </div>
          <div class="section-nav-item" data-section="tradingReport">
            <span class="section-nav-dot"></span>
            <span class="section-nav-label">交易分析与报告</span>
          </div>
          <div class="section-nav-item section-nav-disabled" data-section="holdingsAnalysis">
            <span class="section-nav-dot"></span>
            <span class="section-nav-label">持仓分析</span>
            <span style="margin-left:auto;font-size:10px;padding:2px 6px;border-radius:8px;background:#f1f5f9;color:#94a3b8;">暂不可用</span>
          </div>
          <div class="section-nav-item" data-section="usMarket">
            <span class="section-nav-dot"></span>
            <span class="section-nav-label">海外市场</span>
          </div>
          <div class="section-nav-item" data-section="crossMarket">
            <span class="section-nav-dot"></span>
            <span class="section-nav-label">跨市场分析</span>
          </div>
        </div>
      </div>

    </div>

    <!-- ====== CONTENT AREA ====== -->
    <div id="content-panel">
      <div class="content-header">
        <span id="content-title">模拟交易</span>
      </div>
      <div id="content-area">
        <div class="content-placeholder">
          <p>请从左侧日历选择日期，然后点击板块查看对应内容</p>
        </div>
      </div>
    </div>

  </div>
</div>

<!-- Load all scripts in dependency order -->
<script src="templates/css.js"></script>
<script src="kline.js"></script>
<script src="templates/cover.js"></script>
<script src="templates/news-policy.js"></script>
<script src="templates/market-overview.js"></script>
<script src="templates/holdings-analysis.js"></script>
<script src="templates/sector-tracking.js"></script>
<script src="templates/low-price-picks.js"></script>
<script src="templates/top5-ranking.js"></script>
<script src="templates/risk-matrix.js"></script>
<script src="templates/recommendation-history.js"></script>
<script src="templates/simfolio.js"></script>
<script src="templates/us-market.js"></script>
<script src="templates/cross-market.js"></script>
<script src="templates/disclaimer-footer.js"></script>
<script src="data/reports-index.js"></script>
<script src="data/recommendation-history.js"></script>
<script src="data/2026-05-22/meta.js"></script>
<script src="data/2026-05-22/section1_newsPolicy.js"></script>
<script src="data/2026-05-22/section2_marketOverview.js"></script>
<script src="data/2026-05-22/section3_holdingsAnalysis.js"></script>
<script src="data/2026-05-22/section4_sectorTracking.js"></script>
<script src="data/2026-05-22/section5_lowPricePicks.js"></script>
<script src="data/2026-05-22/section6_top5Ranking.js"></script>
<script src="data/2026-05-22/section7_riskMatrix.js"></script>
<script src="renderer.js"></script>
<script src="app.js"></script>

</body>
</html>
