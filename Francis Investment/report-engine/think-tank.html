<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mosaic AI 思考舱</title>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<style>
  :root {
    --bg: #080c14;
    --panel: #0d1320;
    --border: #1a2540;
    --text: #b0c4d8;
    --text-bright: #e0e8f0;
    --cyan: #00d4ff;
    --green: #00e676;
    --amber: #ffb800;
    --red: #ff3b4a;
    --purple: #a78bfa;
    --dim: #4a5568;
    --font: 'Consolas', 'Courier New', 'Microsoft YaHei', monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html { height: 100%; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', 'Consolas', 'Courier New', monospace;
    font-size: 13px;
    line-height: 1.5;
    overflow-x: hidden;
    min-height: 100vh;
    min-height: 100dvh;
    -webkit-overflow-scrolling: touch;
    -webkit-text-size-adjust: 100%;
  }

  /* Background grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px);
    background-size: 32px 32px;
    pointer-events: none;
    z-index: 0;
  }

  /* Particle layer */
  .particles {
    position: fixed; inset: 0; pointer-events: none; z-index: 0;
    overflow: hidden;
  }
  .particle {
    position: absolute;
    background: var(--cyan);
    border-radius: 50%;
    opacity: 0;
    animation: floatUp linear infinite;
  }
  @keyframes floatUp {
    0% { transform: translateY(100vh) scale(0); opacity: 0; }
    10% { opacity: 0.6; }
    90% { opacity: 0.1; }
    100% { transform: translateY(-10vh) scale(1.5); opacity: 0; }
  }

  /* Layout */
  .app { position: relative; z-index: 1; padding: 8px 12px; max-width: 1600px; margin: 0 auto; }

  /* Header */
  .header {
    display: flex; align-items: center; gap: 20px;
    padding: 10px 16px; margin-bottom: 8px;
    background: var(--panel); border: 1px solid var(--border); border-radius: 8px;
  }
  .header-logo { font-size: 18px; font-weight: bold; color: var(--cyan); white-space: nowrap; }
  .header-logo .dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 8px; }
  .header-logo .dot.active { background: var(--cyan); box-shadow: 0 0 12px var(--cyan); }
  .header-logo .dot.warm { background: var(--amber); box-shadow: 0 0 8px var(--amber); }
  .header-logo .dot.idle { background: var(--dim); }
  .header-logo .dot.scanning { background: var(--green); box-shadow: 0 0 12px var(--green); }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
  .header-logo .dot.animated {
    animation: logoPulse 2s ease-in-out infinite;
  }
  @keyframes logoPulse {
    0% { transform: scale(1); box-shadow: 0 0 4px currentColor; }
    50% { transform: scale(1.3); box-shadow: 0 0 16px currentColor; }
    100% { transform: scale(1); box-shadow: 0 0 4px currentColor; }
  }
  .header-logo .dot.spin {
    animation: logoSpin 3s linear infinite;
  }
  @keyframes logoSpin {
    0% { transform: rotate(0deg) scale(1); }
    50% { transform: rotate(180deg) scale(1.2); }
    100% { transform: rotate(360deg) scale(1); }
  }

  .header-state {
    padding: 3px 10px; border-radius: 4px; font-size: 12px; font-weight: bold;
  }
  .header-state.morning_session, .header-state.afternoon_session { background: rgba(0,230,118,0.15); color: var(--green); }
  .header-state.pre_market, .header-state.post_market { background: rgba(255,184,0,0.15); color: var(--amber); }
  .header-state.closed, .header-state.lunch_break { background: rgba(160,170,190,0.1); color: var(--dim); }

  .header-clock { font-size: 22px; font-weight: bold; color: var(--text-bright); margin-left: auto; font-variant-numeric: tabular-nums; }
  .header-date { color: var(--dim); font-size: 12px; }

  .header-stats { display: flex; gap: 16px; margin-left: 20px; }
  .header-stat { text-align: center; }
  .header-stat .val { font-size: 16px; font-weight: bold; color: var(--text-bright); }
  .header-stat .lbl { font-size: 10px; color: var(--dim); }

  /* Main grid */
  .main-grid {
    display: grid; grid-template-columns: 1fr 1fr;
    grid-template-rows: auto auto;
    gap: 8px; margin-bottom: 8px;
  }

  /* Panel base */
  .panel {
    background: var(--panel); border: 1px solid var(--border); border-radius: 8px;
    padding: 12px 16px; overflow: hidden;
  }
  .panel-header {
    display: flex; align-items: center; gap: 8px;
    margin-bottom: 10px; padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
    font-size: 12px; font-weight: bold; color: var(--dim); text-transform: uppercase; letter-spacing: 1px;
  }
  .panel-header .icon { font-size: 14px; }
  .panel-header .title { color: var(--text-bright); }

  /* Thought Stream */
  .thought-stream { grid-row: span 2; }
  .thought-current {
    min-height: 60px; padding: 10px 14px;
    background: rgba(0,212,255,0.04); border: 1px solid rgba(0,212,255,0.15);
    border-radius: 6px; margin-bottom: 10px;
    position: relative; overflow: hidden;
  }
  .thought-current .scan-line {
    position: absolute; left: 0; right: 0; height: 1px;
    background: linear-gradient(90deg, transparent, var(--cyan), transparent);
    animation: scanDown 3s ease-in-out infinite;
  }
  @keyframes scanDown {
    0% { top: 0; opacity: 0; }
    50% { opacity: 1; }
    100% { top: 100%; opacity: 0; }
  }
  .thought-current .thinking-label {
    font-size: 10px; color: var(--cyan); text-transform: uppercase; letter-spacing: 2px;
    margin-bottom: 6px; animation: blink 1.5s step-end infinite;
  }
  @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
  .thought-current .thinking-content { font-size: 14px; color: var(--text-bright); line-height: 1.6; }
  .thought-current .highlight { color: var(--cyan); }
  .thought-current .signal-tag {
    display: inline-block; padding: 1px 6px; margin: 2px; border-radius: 3px;
    font-size: 11px; font-weight: bold;
  }
  .signal-tag.strong { background: rgba(0,230,118,0.2); color: var(--green); }
  .signal-tag.medium { background: rgba(255,184,0,0.2); color: var(--amber); }
  .signal-tag.weak { background: rgba(160,170,190,0.15); color: var(--dim); }

  .thought-progress { margin: 8px 0; }
  .thought-progress .bar-bg {
    height: 4px; background: var(--border); border-radius: 2px; overflow: hidden;
  }
  .thought-progress .bar-fg {
    height: 100%; background: linear-gradient(90deg, var(--cyan), var(--green));
    border-radius: 2px; transition: width 0.5s ease;
  }
  .thought-progress .info { font-size: 10px; color: var(--dim); margin-top: 3px; display: flex; justify-content: space-between; }

  .thought-log {
    max-height: 400px; overflow-y: auto;
    scrollbar-width: thin; scrollbar-color: var(--border) transparent;
  }
  .thought-log::-webkit-scrollbar { width: 4px; }
  .thought-log::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  .thought-entry {
    padding: 5px 0; border-bottom: 1px solid rgba(26,37,64,0.5);
    font-size: 12px; animation: fadeSlideIn 0.3s ease;
  }
  @keyframes fadeSlideIn {
    from { opacity: 0; transform: translateX(-8px); }
    to { opacity: 1; transform: translateX(0); }
  }
  .thought-entry .time { color: var(--dim); font-size: 10px; margin-right: 6px; }
  .thought-entry .code { color: var(--cyan); margin: 0 4px; }
  .thought-entry .score { color: var(--amber); font-weight: bold; }

  /* Factor Scanner */
  .factor-scanner { }
  .factor-row {
    display: flex; align-items: center; gap: 8px; margin-bottom: 6px;
  }
  .factor-label {
    width: 100px; font-size: 11px; color: var(--text); white-space: nowrap;
    text-align: right; overflow: hidden; text-overflow: ellipsis;
  }
  .factor-bar-bg {
    flex: 1; height: 14px; background: var(--border); border-radius: 3px; overflow: hidden; position: relative;
  }
  .factor-bar-fg {
    height: 100%; border-radius: 3px; transition: width 0.8s cubic-bezier(0.4,0,0.2,1);
    position: relative;
  }
  .factor-bar-fg.h1 { background: linear-gradient(90deg, #00d4ff, #0090b0); }
  .factor-bar-fg.h2 { background: linear-gradient(90deg, #ffb800, #b88000); }
  .factor-bar-fg.h3 { background: linear-gradient(90deg, #a78bfa, #6d50c0); }
  .factor-bar-fg.h4 { background: linear-gradient(90deg, #00e676, #009040); }
  .factor-bar-fg.h5 { background: linear-gradient(90deg, #ff6b9d, #b04060); }
  .factor-bar-fg.h6 { background: linear-gradient(90deg, #4fc3f7, #2080b0); }
  .factor-bar-fg.h7 { background: linear-gradient(90deg, #ffd54f, #b09030); }
  .factor-bar-fg.h8 { background: linear-gradient(90deg, #ef5350, #a03030); }
  .factor-bar-fg.h9 { background: linear-gradient(90deg, #26c6da, #107080); }
  .factor-count { width: 40px; font-size: 11px; color: var(--text-bright); text-align: left; font-weight: bold; }
  .factor-empty { color: var(--dim); font-size: 11px; text-align: center; padding: 20px; }

  /* Score Distribution */
  .score-dist { margin-top: 12px; }
  .dist-row {
    display: flex; align-items: center; gap: 8px; margin-bottom: 5px;
  }
  .dist-label { width: 55px; font-size: 10px; color: var(--dim); text-align: right; }
  .dist-bar-bg { flex: 1; height: 16px; background: var(--border); border-radius: 3px; overflow: hidden; }
  .dist-bar-fg { height: 100%; border-radius: 3px; transition: width 0.8s ease; }
  .dist-bar-fg.low { background: rgba(255,59,74,0.5); }
  .dist-bar-fg.mid { background: rgba(255,184,0,0.5); }
  .dist-bar-fg.good { background: rgba(0,212,255,0.5); }
  .dist-bar-fg.great { background: rgba(0,230,118,0.5); }
  .dist-bar-fg.elite { background: rgba(0,230,118,0.8); }
  .dist-pct { width: 40px; font-size: 11px; color: var(--text-bright); font-weight: bold; }

  /* Enrichment panel */
  .enrichment { margin-top: 12px; }
  .enrich-item {
    display: flex; justify-content: space-between; padding: 4px 0;
    border-bottom: 1px solid rgba(26,37,64,0.4); font-size: 12px;
  }
  .enrich-item .key { color: var(--dim); }
  .enrich-item .val { color: var(--text-bright); font-weight: bold; }
  .enrich-item .val.bullish { color: var(--green); }
  .enrich-item .val.bearish { color: var(--red); }

  /* Event Timeline */
  .timeline { margin-bottom: 8px; }
  .timeline-scroll {
    max-height: 180px; overflow-y: auto;
    scrollbar-width: thin; scrollbar-color: var(--border) transparent;
  }
  .timeline-scroll::-webkit-scrollbar { width: 4px; }
  .timeline-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  .tl-entry {
    display: flex; gap: 8px; padding: 4px 8px; font-size: 11px;
    border-bottom: 1px solid rgba(26,37,64,0.3); animation: fadeSlideIn 0.3s ease;
  }
  .tl-entry .tl-time { color: var(--dim); white-space: nowrap; min-width: 70px; }
  .tl-entry .tl-tag {
    padding: 0 6px; border-radius: 3px; font-size: 10px; font-weight: bold;
    white-space: nowrap; min-width: 50px; text-align: center;
  }
  .tl-tag.scan { background: rgba(0,212,255,0.15); color: var(--cyan); }
  .tl-tag.factor { background: rgba(167,139,250,0.15); color: var(--purple); }
  .tl-tag.flow { background: rgba(255,184,0,0.15); color: var(--amber); }
  .tl-tag.trade { background: rgba(0,230,118,0.15); color: var(--green); }
  .tl-tag.alert { background: rgba(255,59,74,0.15); color: var(--red); }
  .tl-tag.state { background: rgba(160,170,190,0.1); color: var(--dim); }
  .tl-entry .tl-msg { color: var(--text); flex: 1; }

  /* Position Bar */
  .position-bar {
    display: flex; align-items: center; gap: 16px;
    padding: 10px 16px; background: var(--panel); border: 1px solid var(--border); border-radius: 8px;
    flex-wrap: wrap;
  }
  .pos-item {
    display: flex; align-items: center; gap: 6px;
    padding: 4px 10px; background: rgba(26,37,64,0.5); border-radius: 4px;
    font-size: 12px;
  }
  .pos-item .pos-name { color: var(--text-bright); font-weight: bold; }
  .pos-item .pos-pnl { font-weight: bold; }
  .pos-item .pos-pnl.up { color: var(--red); }
  .pos-item .pos-pnl.down { color: var(--green); }
  .pos-cash { margin-left: auto; font-size: 12px; color: var(--dim); }
  .pos-cash .val { color: var(--text-bright); font-weight: bold; font-size: 14px; }
  .pos-total { font-size: 12px; color: var(--dim); }
  .pos-total .val { color: var(--cyan); font-weight: bold; font-size: 14px; }
  .no-positions { color: var(--dim); font-style: italic; }

  /* Top 5 mini table */
  .top5-mini { margin-top: 8px; }
  .top5-row {
    display: flex; align-items: center; gap: 6px; padding: 3px 0;
    border-bottom: 1px solid rgba(26,37,64,0.3); font-size: 11px;
  }
  .top5-rank { width: 18px; text-align: center; font-weight: bold; }
  .top5-rank.r1 { color: #ffd700; } .top5-rank.r2 { color: #c0c0c0; } .top5-rank.r3 { color: #cd7f32; }
  .top5-name { flex: 1; color: var(--text-bright); }
  .top5-code { color: var(--dim); font-size: 10px; }
  .top5-score { font-weight: bold; color: var(--amber); }

  /* Factor Performance Cards */
  .fp-card {
    background: rgba(13,19,32,0.6);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 4px;
    text-align: center;
    cursor: default;
    transition: all 0.4s ease;
    position: relative;
    overflow: hidden;
    min-width: 0;
  }
  .fp-card:hover {
    border-color: rgba(0,212,255,0.3);
    background: rgba(0,212,255,0.04);
  }
  .fp-card.entering {
    animation: fpCardEnter 0.5s cubic-bezier(0.34,1.56,0.64,1) both;
  }
  .fp-card.hot {
    border-color: rgba(0,230,118,0.5);
    animation: hotGlow 2s ease-in-out infinite;
  }
  .fp-card.cold {
    border-color: rgba(255,59,74,0.3);
    opacity: 0.85;
  }
  @keyframes fpCardEnter {
    from { opacity: 0; transform: translateY(12px) scale(0.95); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }
  @keyframes hotGlow {
    0%, 100% { box-shadow: 0 0 8px rgba(0,230,118,0.1); }
    50% { box-shadow: 0 0 18px rgba(0,230,118,0.25); }
  }
  .fp-card .fp-name {
    font-size: 9px; color: var(--dim); margin-bottom: 1px;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .fp-card .fp-id {
    font-size: 11px; font-weight: bold; color: var(--text-bright); margin-bottom: 3px;
  }
  .fp-card canvas { display: block; margin: 0 auto; }
  .fp-card .fp-return {
    font-size: 10px; margin-top: 2px; font-weight: bold;
  }
  .fp-card .fp-count {
    font-size: 8px; color: var(--dim); margin-top: 1px;
  }
  .fp-card .fp-status {
    font-size: 8px; font-weight: bold; margin-top: 2px;
    padding: 1px 5px; border-radius: 3px; display: inline-block;
    letter-spacing: 0.5px;
  }
  .fp-status.hot { background: rgba(0,230,118,0.15); color: var(--green); }
  .fp-status.stable { background: rgba(255,184,0,0.12); color: var(--amber); }
  .fp-status.cold { background: rgba(255,59,74,0.1); color: var(--red); }

  /* Responsive — Tablet */
  @media (max-width: 900px) {
    .main-grid { grid-template-columns: 1fr; }
    .thought-stream { grid-row: span 1; }
    .header { flex-wrap: wrap; gap: 10px; }
    .header-stats { margin-left: 0; gap: 10px; }
    .header-clock { font-size: 18px; }
  }

  /* Responsive — Phone */
  @media (max-width: 600px) {
    /* Simplify heavy background on mobile for performance */
    body::before { background-image: none; }
    .particles { display: none; }

    .app { padding: 4px 6px; }
    .header {
      flex-direction: column; align-items: flex-start; gap: 6px;
      padding: 8px 12px;
    }
    .header-logo { font-size: 14px; }
    .header-stats {
      margin-left: 0; gap: 8px; flex-wrap: wrap;
    }
    .header-stat .val { font-size: 13px; }
    .header-stat .lbl { font-size: 9px; }
    .header-clock { font-size: 16px; margin-left: 0; }
    .header-date { font-size: 10px; }
    .main-grid { grid-template-columns: 1fr; gap: 6px; }
    .thought-stream { grid-row: span 1; }
    .panel { padding: 8px 10px; }
    .panel-header { font-size: 10px; }
    .thought-current { min-height: 40px; padding: 8px 10px; }
    .thought-current .thinking-content { font-size: 12px; }
    .thought-log { max-height: 200px; }
    .factor-label { width: 60px; font-size: 9px; }
    .timeline-scroll { max-height: 150px; }
    .tl-entry { font-size: 10px; padding: 3px 4px; }
    .tl-entry .tl-time { min-width: 55px; font-size: 9px; }
    .tl-entry .tl-tag { font-size: 9px; min-width: 40px; padding: 0 4px; }
    .position-bar {
      flex-direction: column; align-items: flex-start; gap: 6px;
      padding: 8px 12px;
    }
    .pos-item { font-size: 10px; padding: 3px 6px; }
    .pos-cash { margin-left: 0; }
    .top5-row { font-size: 10px; }
    .top5-code { font-size: 9px; }
    .dist-label { width: 40px; font-size: 9px; }
    .dist-pct { width: 35px; font-size: 10px; }
    .enrich-item { font-size: 10px; }
    .header-state { font-size: 10px; padding: 2px 8px; }
  }

  /* Responsive — Small phone */
  @media (max-width: 380px) {
    .header-stats { gap: 4px; }
    .header-stat { min-width: 40px; }
    .header-stat .val { font-size: 11px; }
    .header-clock { font-size: 14px; }
    .factor-label { width: 48px; font-size: 8px; }
    .factor-count { width: 28px; font-size: 10px; }
    .tl-entry .tl-time { min-width: 45px; font-size: 8px; }
  }

  /* Idle state overlay */
  .idle-overlay {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 40px; color: var(--dim); text-align: center;
  }
  .idle-overlay .big-icon { font-size: 48px; margin-bottom: 12px; opacity: 0.5; }
  .idle-overlay .msg { font-size: 16px; margin-bottom: 4px; }
  .idle-overlay .sub { font-size: 12px; }
</style>
</head>
<body>

<div class="particles" id="particles"></div>

<div class="app">
  <!-- Header -->
  <div class="header">
    <div class="header-logo">
      <span class="dot idle animated" id="stateDot" style="display:inline-flex;align-items:center;justify-content:center;position:relative;">
        <span style="position:absolute;width:10px;height:10px;border-radius:50%;border:2px solid var(--cyan);animation:logoPulse 2s ease-in-out infinite;"></span>
      </span>
      Franciz AI 思考舱
    </div>
    <span class="header-state closed" id="stateBadge">离市</span>
    <div class="header-stats">
      <div class="header-stat"><div class="val" id="statStocks">--</div><div class="lbl">全市场</div></div>
      <div class="header-stat"><div class="val" id="statCandidates">--</div><div class="lbl">候选股</div></div>
      <div class="header-stat"><div class="val" id="statAnalyzed">--</div><div class="lbl">深度分析</div></div>
      <div class="header-stat"><div class="val" id="statTopScore">--</div><div class="lbl">最高评分</div></div>
    </div>
    <button id="btn-standard" style="margin-left:8px;padding:4px 12px;border-radius:4px;font-size:11px;font-weight:bold;cursor:pointer;background:rgba(0,212,255,0.1);color:var(--cyan);border:1px solid rgba(0,212,255,0.3);white-space:nowrap;font-family:inherit;" onclick="showStandardModal()">Standard</button>
    <div class="header-clock" id="clock">--:--:--</div>
    <div class="header-date" id="dateDisplay">----.--.--</div>
  </div>

  <!-- Main Grid -->
  <div class="main-grid">
    <!-- Left: AI Thought Stream -->
    <div class="panel thought-stream" id="thoughtPanel">
      <div class="panel-header"><span class="icon">&#9678;</span><span class="title">AI 思维流</span></div>
      <div class="thought-current" id="thoughtCurrent">
        <div class="scan-line"></div>
        <div class="thinking-label" id="thinkingLabel">● 待命中</div>
        <div class="thinking-content" id="thinkingContent">
          等待下一次市场扫描...
        </div>
        <div class="thought-progress" id="thoughtProgress" style="display:none">
          <div class="bar-bg"><div class="bar-fg" id="progressBar" style="width:0%"></div></div>
          <div class="info"><span id="progressStep"></span><span id="progressPct">0%</span></div>
        </div>
      </div>
      <!-- Market Index Intraday Line Chart -->
      <div id="market-index-chart" style="margin-bottom:8px;">
        <div style="display:flex;gap:8px;margin-bottom:4px;align-items:center;" id="index-labels"></div>
        <canvas id="indexLineCanvas" width="600" height="180" style="width:100%;height:180px;border-radius:4px;background:rgba(0,0,0,0.2);display:block;"></canvas>
      </div>
      <!-- Scan Records -->

// ---- Market Index Intraday Line Chart ----
var indexHistory = { points: [], date: '' };
var indexPollTimer = null;

function fetchIndexHistory() {
  fetch('/api/indices/today')
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (data.ok && data.points && data.points.length > 0) {
        indexHistory = { points: data.points, date: data.date };
      }
      drawIndexChart();
      updateIndexLabels();
    })
    .catch(function() {
      drawIndexChart();
      updateIndexLabels();
    });
}

function drawIndexChart() {
  var canvas = document.getElementById('indexLineCanvas');
  if (!canvas) return;
  var ctx = canvas.getContext('2d');
  var dpr = window.devicePixelRatio || 1;
  var rect = canvas.getBoundingClientRect();
  var W = rect.width;
  var H = 180;
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

  // Background
  ctx.fillStyle = 'rgba(0,0,0,0.2)';
  ctx.fillRect(0, 0, W, H);

  var points = indexHistory.points || [];
  if (points.length < 2) {
    ctx.fillStyle = 'rgba(160,170,190,0.5)';
    ctx.font = '12px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(points.length === 0 ? '等待指数数据...' : '数据采集中，请稍后...', W / 2, H / 2);
    return;
  }

  var PAD_L = 48, PAD_R = 16, PAD_T = 10, PAD_B = 28;
  var plotW = W - PAD_L - PAD_R;
  var plotH = H - PAD_T - PAD_B;

  // Compute base prices (first valid value per series = opening)
  var series = [
    { key: 'sh', color: '#ff3b4a', label: '上证' },
    { key: 'sz', color: '#00d4ff', label: '深证' },
    { key: 'bj', color: '#00e676', label: '北证' },
  ];

  var firstVals = {};
  for (var si = 0; si < series.length; si++) {
    var sk = series[si].key;
    for (var pi = 0; pi < points.length; pi++) {
      if (points[pi][sk] != null) { firstVals[sk] = points[pi][sk]; break; }
    }
  }

  // Convert to percentage change from opening
  var pctPoints = [];
  for (var i = 0; i < points.length; i++) {
    var p = {};
    p.time = points[i].time;
    for (var si2 = 0; si2 < series.length; si2++) {
      var k = series[si2].key;
      if (points[i][k] != null && firstVals[k] != null) {
        p[k] = (points[i][k] - firstVals[k]) / firstVals[k] * 100;
      }
    }
    pctPoints.push(p);
  }

  // Compute overall min/max % range
  var allPct = [];
  for (var j = 0; j < pctPoints.length; j++) {
    for (var si3 = 0; si3 < series.length; si3++) {
      var v = pctPoints[j][series[si3].key];
      if (v != null) allPct.push(v);
    }
  }
  if (allPct.length === 0) return;
  var minPct = Math.min.apply(null, allPct);
  var maxPct = Math.max.apply(null, allPct);
  var range = maxPct - minPct || 0.5;
  minPct -= range * 0.1;
  maxPct += range * 0.1;
  range = maxPct - minPct;

  function xFor(i) { return PAD_L + (i / (pctPoints.length - 1)) * plotW; }
  function yFor(v) { return PAD_T + (1 - (v - minPct) / range) * plotH; }

  // Zero line
  var zeroY = yFor(0);
  ctx.strokeStyle = 'rgba(255,255,255,0.12)';
  ctx.lineWidth = 1;
  ctx.setLineDash([4, 4]);
  ctx.beginPath();
  ctx.moveTo(PAD_L, zeroY);
  ctx.lineTo(W - PAD_R, zeroY);
  ctx.stroke();
  ctx.setLineDash([]);

  // Grid lines
  ctx.strokeStyle = 'rgba(255,255,255,0.06)';
  ctx.lineWidth = 0.5;
  var gridLines = 4;
  for (var g = 0; g <= gridLines; g++) {
    var gy = PAD_T + (g / gridLines) * plotH;
    var val = maxPct - (g / gridLines) * range;
    // Skip zero line already drawn
    if (Math.abs(val) < 0.01) {
      ctx.fillStyle = 'rgba(160,170,190,0.3)';
    } else {
      ctx.beginPath();
      ctx.moveTo(PAD_L, gy);
      ctx.lineTo(W - PAD_R, gy);
      ctx.stroke();
      ctx.fillStyle = 'rgba(160,170,190,0.7)';
    }
    ctx.font = '9px monospace';
    ctx.textAlign = 'right';
    ctx.fillText((val >= 0 ? '+' : '') + val.toFixed(2) + '%', PAD_L - 4, gy + 3);
  }

  // Time labels
  var timeLabels = [0, Math.floor((pctPoints.length - 1) / 2), pctPoints.length - 1];
  ctx.fillStyle = 'rgba(160,170,190,0.5)';
  ctx.font = '9px monospace';
  ctx.textAlign = 'center';
  for (var ti = 0; ti < timeLabels.length; ti++) {
    ctx.fillText(pctPoints[timeLabels[ti]].time, xFor(timeLabels[ti]), H - 6);
  }

  // Draw series lines
  for (var si = 0; si < series.length; si++) {
    var s = series[si];
    var started = false;
    ctx.strokeStyle = s.color;
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    for (var pi = 0; pi < pctPoints.length; pi++) {
      var v = pctPoints[pi][s.key];
      if (v == null) { started = false; continue; }
      var cx = xFor(pi);
      var cy = yFor(v);
      if (!started) { ctx.moveTo(cx, cy); started = true; }
      else { ctx.lineTo(cx, cy); }
    }
    ctx.stroke();

    // Dot at last value
    for (var pi2 = pctPoints.length - 1; pi2 >= 0; pi2--) {
      if (pctPoints[pi2][s.key] != null) {
        var lx = xFor(pi2);
        var ly = yFor(pctPoints[pi2][s.key]);
        ctx.fillStyle = s.color;
        ctx.beginPath();
        ctx.arc(lx, ly, 3, 0, Math.PI * 2);
        ctx.fill();
        break;
      }
    }
  }
}

function updateIndexLabels() {
  var container = document.getElementById('index-labels');
  if (!container) return;
  var points = indexHistory.points || [];
  // Get latest values
  var latest = { sh: null, sz: null, bj: null };
  for (var i = points.length - 1; i >= 0; i--) {
    if (latest.sh == null && points[i].sh != null) latest.sh = points[i].sh;
    if (latest.sz == null && points[i].sz != null) latest.sz = points[i].sz;
    if (latest.bj == null && points[i].bj != null) latest.bj = points[i].bj;
    if (latest.sh != null && latest.sz != null && latest.bj != null) break;
  }
  // Get first values for change calc
  var first = { sh: null, sz: null, bj: null };
  for (var j = 0; j < points.length; j++) {
    if (first.sh == null && points[j].sh != null) first.sh = points[j].sh;
    if (first.sz == null && points[j].sz != null) first.sz = points[j].sz;
    if (first.bj == null && points[j].bj != null) first.bj = points[j].bj;
    if (first.sh != null && first.sz != null && first.bj != null) break;
  }

  var items = [
    { key: 'sh', name: '上证', color: '#ff3b4a' },
    { key: 'sz', name: '深证', color: '#00d4ff' },
    { key: 'bj', name: '北证', color: '#00e676' },
  ];
  var html = '';
  for (var k = 0; k < items.length; k++) {
    var it = items[k];
    var price = latest[it.key];
    var firstPrice = first[it.key];
    var chgStr = '';
    if (price != null && firstPrice != null && firstPrice !== 0) {
      var chg = ((price - firstPrice) / firstPrice * 100);
      var sign = chg >= 0 ? '+' : '';
      var clr = chg >= 0 ? '#ff3b4a' : '#00e676';
      chgStr = ' <span style="color:' + clr + ';font-size:10px;">' + sign + chg.toFixed(2) + '%</span>';
    }
    html += '<span style="color:' + it.color + ';font-size:11px;font-weight:bold;">' +
      it.name + ' ' + (price != null ? price.toFixed(2) : '--') + chgStr + '</span>';
  }
  container.innerHTML = html;
}

function startIndexPolling() {
  fetchIndexHistory();
  if (indexPollTimer) clearInterval(indexPollTimer);
  indexPollTimer = setInterval(fetchIndexHistory, 30000);
}

// Start index polling on load
setTimeout(startIndexPolling, 1000);

// ---- Factor bars ----
const FACTOR_DEFS = [
  { id: 'H1', name: '缩量止跌', cls: 'h1' },
  { id: 'H2', name: '底部放量', cls: 'h2' },
  { id: 'H3', name: '逆势抗跌', cls: 'h3' },
  { id: 'H4', name: 'PE低估', cls: 'h4' },
  { id: 'H5', name: '高ROE低PB', cls: 'h5' },
  { id: 'H6', name: '现金流健康', cls: 'h6' },
  { id: 'H7', name: '低换手蓄力', cls: 'h7' },
  { id: 'H8', name: '短期反转', cls: 'h8' },
  { id: 'H9', name: '量价背离', cls: 'h9' },
];

let factorCounts = {};
let maxFactorCount = 0;
let lastResult = null;
let nextScanInfo = null;
let initialDataLoaded = false;

function updateFactorBars() {
  const container = document.getElementById('factorBars');
  if (Object.keys(factorCounts).length === 0) {
    container.innerHTML = '<div class="factor-empty">等待分析数据...</div>';
    return;
  }
  maxFactorCount = Math.max(1, ...Object.values(factorCounts));
  let html = '';
  for (const f of FACTOR_DEFS) {
    const count = factorCounts[f.id] || 0;
    const pct = maxFactorCount > 0 ? Math.round(count / maxFactorCount * 100) : 0;
    html += '<div class="factor-row">' +
      '<span class="factor-label">' + f.name + '</span>' +
      '<div class="factor-bar-bg"><div class="factor-bar-fg ' + f.cls + '" style="width:' + pct + '%"></div></div>' +
      '<span class="factor-count">' + count + '</span>' +
      '</div>';
  }
  container.innerHTML = html;
}

// ---- Score Distribution ----
function updateScoreDist(dist) {
  document.getElementById('scoreDist').style.display = 'block';
  const container = document.getElementById('distBars');
  const total = Math.max(1, (dist.lt50||0) + (dist.r50_60||0) + (dist.r60_70||0) + (dist.r70_80||0) + (dist.gt80||0));
  const items = [
    { label: '<50', cls: 'low', val: dist.lt50 || 0 },
    { label: '50-60', cls: 'mid', val: dist.r50_60 || 0 },
    { label: '60-70', cls: 'good', val: dist.r60_70 || 0 },
    { label: '70-80', cls: 'great', val: dist.r70_80 || 0 },
    { label: '80+', cls: 'elite', val: dist.gt80 || 0 },
  ];
  let html = '';
  for (const item of items) {
    const pct = Math.round(item.val / total * 100);
    html += '<div class="dist-row">' +
      '<span class="dist-label">' + item.label + '</span>' +
      '<div class="dist-bar-bg"><div class="dist-bar-fg ' + item.cls + '" style="width:' + pct + '%"></div></div>' +
      '<span class="dist-pct">' + item.val + ' (' + pct + '%)</span>' +
      '</div>';
  }
  container.innerHTML = html;
}

// ---- Thought Log ----
let thoughtEntries = [];
const MAX_THOUGHT_ENTRIES = 50;

function addThoughtEntry(html) {
  thoughtEntries.unshift(html);
  if (thoughtEntries.length > MAX_THOUGHT_ENTRIES) thoughtEntries.pop();
  const container = document.getElementById('thoughtLog');
  container.innerHTML = thoughtEntries.join('');
  container.scrollTop = 0;
}

function clearThoughtLog() {
  thoughtEntries = [];
  document.getElementById('thoughtLog').innerHTML = '';
}

// ---- Timeline ----
let eventEntries = [];
const MAX_EVENTS = 200;
let currentEventDate = 'today'; // 'today' or a date string
let availableEventDates = [];

function addTimelineEntry(time, tag, tagClass, msg) {
  // If viewing a historical date, don't add live events
  if (currentEventDate !== 'today') return;

  eventEntries.unshift(
    '<div class="tl-entry"><span class="tl-time">' + time + '</span>' +
    '<span class="tl-tag ' + tagClass + '">' + tag + '</span>' +
    '<span class="tl-msg">' + msg + '</span></div>'
  );
  if (eventEntries.length > MAX_EVENTS) eventEntries.pop();
  const container = document.getElementById('timeline');
  container.innerHTML = eventEntries.join('');
  document.getElementById('eventCount').textContent = eventEntries.length + ' 事件';
}

function onEventDateChange(value) {
  currentEventDate = value;
  if (value === 'today') {
    // Restore today's events from the in-memory array
    renderTimelineFromArray(eventEntries);
    document.getElementById('eventCount').textContent = eventEntries.length + ' 事件';
  } else {
    // Load historical events from server
    loadEventsForDate(value);
  }
}

function loadEventsForDate(dateStr) {
  var tl = document.getElementById('timeline');
  tl.innerHTML = '<div class="tl-entry"><span class="tl-time">--:--:--</span><span class="tl-tag state">加载</span><span class="tl-msg">加载中...</span></div>';

  fetch('/api/events/' + dateStr)
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (!data.ok || !data.events || data.events.length === 0) {
        tl.innerHTML = '<div class="tl-entry"><span class="tl-time">--:--:--</span><span class="tl-tag state">系统</span><span class="tl-msg">该日期无事件记录</span></div>';
        document.getElementById('eventCount').textContent = '0 事件';
        return;
      }
      var entries = [];
      for (var i = data.events.length - 1; i >= 0; i--) {
        var evt = data.events[i];
        var time = isoToLocalTime(evt.time);
        var tag = mapEventTag(evt.type);
        var tagClass = mapEventClass(evt.type);
        var msg = formatEventMsg(evt);
        entries.push(
          '<div class="tl-entry"><span class="tl-time">' + time + '</span>' +
          '<span class="tl-tag ' + tagClass + '">' + tag + '</span>' +
          '<span class="tl-msg">' + msg + '</span></div>'
        );
      }
      tl.innerHTML = entries.join('');
      document.getElementById('eventCount').textContent = data.events.length + ' 事件';
      document.getElementById('eventDateSelect').value = dateStr;
    })
    .catch(function() {
      tl.innerHTML = '<div class="tl-entry"><span class="tl-time">--:--:--</span><span class="tl-tag alert">错误</span><span class="tl-msg">加载失败</span></div>';
    });
}

function renderTimelineFromArray(entries) {
  var tl = document.getElementById('timeline');
  if (entries.length === 0) {
    tl.innerHTML = '<div class="tl-entry"><span class="tl-time">--:--:--</span><span class="tl-tag state">系统</span><span class="tl-msg">等待事件...</span></div>';
  } else {
    tl.innerHTML = entries.join('');
  }
}

function populateEventDates(dates) {
  availableEventDates = dates || [];
  var select = document.getElementById('eventDateSelect');
  // Keep the "today" option
  select.innerHTML = '<option value="today">今天</option>';
  for (var i = 0; i < availableEventDates.length; i++) {
    var d = availableEventDates[i];
    var selected = (currentEventDate === d) ? ' selected' : '';
    select.innerHTML += '<option value="' + d + '"' + selected + '>' + d + '</option>';
  }
}

function populateTimelineFromEvents(events) {
  eventEntries = [];
  if (!events || events.length === 0) {
    renderTimelineFromArray([]);
    document.getElementById('eventCount').textContent = '0 事件';
    return;
  }
  for (var i = events.length - 1; i >= 0; i--) {
    var evt = events[i];
    var time = isoToLocalTime(evt.time);
    var tag = mapEventTag(evt.type);
    var tagClass = mapEventClass(evt.type);
    var msg = formatEventMsg(evt);
    eventEntries.push(
      '<div class="tl-entry"><span class="tl-time">' + time + '</span>' +
      '<span class="tl-tag ' + tagClass + '">' + tag + '</span>' +
      '<span class="tl-msg">' + msg + '</span></div>'
    );
  }
  // Reverse for chronological display (newest first)
  eventEntries.reverse();
  renderTimelineFromArray(eventEntries);
  document.getElementById('eventCount').textContent = eventEntries.length + ' 事件';
}

// ---- Position Bar ----
function updatePositionBar(data) {
  const bar = document.getElementById('positionBar');
  if (!data.positions || data.positions.length === 0) {
    bar.innerHTML = '<span style="color:var(--dim);font-size:12px">&#9636; 持仓监控</span>' +
      '<span class="no-positions">无持仓</span>' +
      '<span class="pos-cash">现金 <span class="val">' + fmtMoney(data.cash || 0) + '</span></span>' +
      '<span class="pos-total">总资产 <span class="val">' + fmtMoney(data.totalValue || 0) + '</span></span>';
  } else {
    let html = '<span style="color:var(--dim);font-size:12px">&#9636; 持仓监控</span>';
    for (const p of data.positions) {
      const pnlClass = p.pnlPct >= 0 ? 'up' : 'down';
      const pnlSign = p.pnlPct >= 0 ? '+' : '';
      html += '<div class="pos-item">' +
        '<span class="pos-name">' + escHtml(p.name) + '</span>' +
        '<span style="color:var(--dim)">' + p.shares + '股</span>' +
        '<span style="color:var(--dim)">@' + fmtPrice(p.currentPrice) + '</span>' +
        '<span class="pos-pnl ' + pnlClass + '">' + pnlSign + p.pnlPct.toFixed(2) + '%</span>' +
        '</div>';
    }
    html += '<span class="pos-cash">现金 <span class="val">' + fmtMoney(data.cash || 0) + '</span></span>';
    html += '<span class="pos-total">总资产 <span class="val">' + fmtMoney(data.totalValue || 0) + '</span></span>';
    bar.innerHTML = html;
  }
  document.getElementById('posCash').textContent = fmtMoney(data.cash || 0);
  document.getElementById('posTotal').textContent = fmtMoney(data.totalValue || 0);
}

function fmtMoney(v) {
  if (v == null) return '--';
  return '¥' + v.toLocaleString('zh-CN', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}
function fmtPrice(v) {
  if (v == null) return '--';
  return v.toFixed(2);
}
function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function isoToLocalTime(isoStr) {
  if (!isoStr) return '--:--:--';
  var d = new Date(isoStr);
  return d.toTimeString().slice(0, 8);
}

// ---- SSE Connection ----
function connectSSE() {
  const es = new EventSource('/api/think-tank/stream');

  es.addEventListener('connected', function(e) {
    thoughtEntries = [];
    nextScanInfo = null;
    // Don't clear eventEntries if already loaded from REST — they get refreshed by daily_events SSE
    if (!initialDataLoaded) {
      eventEntries = [];
    }
    // Don't clear lastResult — keep stale data until fresh data arrives
    var msg = initialDataLoaded
      ? '<div class="msg" style="color:var(--green)">已重新连接到 Franciz AI 引擎</div>'
      : '<div class="msg" style="color:var(--green)">已连接到 Franciz AI 引擎</div>';
    addThoughtEntry('<div class="idle-overlay"><div class="big-icon" style="color:var(--green)">&#9678;</div>' +
      msg + '<div class="sub">等待分析事件...</div></div>');
    if (!initialDataLoaded) {
      addTimelineEntry(new Date().toTimeString().slice(0,8), '连接', 'state', 'SSE 已连接到 Franciz 服务器');
    }
    updateIdleDisplay();
    renderScanRecords();
  });

  es.addEventListener('heartbeat', function(e) {
    try {
      const d = JSON.parse(e.data);
      if (d.state) updateStateUI(d.state);
      // Update next scan countdown
      if (d.nextScan) {
        const nextTime = new Date(d.nextScan.time);
        const now = new Date();
        const diffMin = Math.max(0, Math.round((nextTime - now) / 60000));
        nextScanInfo = { time: nextTime, label: d.nextScan.label, diffMin: diffMin };
        updateIdleDisplay();
      }
    } catch(ex) {}
  });

  es.addEventListener('history', function(e) {
    try {
      const d = JSON.parse(e.data);
      if (d.events) {
        for (const evt of d.events) {
          const time = isoToLocalTime(evt.time);
          addTimelineEntry(time, mapEventTag(evt.type), mapEventClass(evt.type), formatEventMsg(evt));
        }
      }
    } catch(ex) {}
  });

  es.addEventListener('position_snapshot', function(e) {
    try { updatePositionBar(JSON.parse(e.data)); } catch(ex) {}
  });

  // daily_events: persisted events sent on connect
  es.addEventListener('daily_events', function(e) {
    try {
      var d = JSON.parse(e.data);
      if (d.events && currentEventDate === 'today') {
        populateTimelineFromEvents(d.events);
      }
      if (d.date) {
        // Update event dates list if needed
        fetch('/api/events/dates')
          .then(function(r) { return r.json(); })
          .then(function(data) {
            if (data.dates) populateEventDates(data.dates);
          })
          .catch(function() {});
      }
    } catch(ex) {}
  });

  // last_result: persisted pipeline result sent on connect
  es.addEventListener('last_result', function(e) {
    try {
      const d = JSON.parse(e.data);
      lastResult = d;
      // Populate factor bars
      if (d.signalCounts) {
        factorCounts = d.signalCounts;
        updateFactorBars();
      }
      // Populate score distribution
      if (d.scoreDistribution) {
        updateScoreDist(d.scoreDistribution);
      }
      // Populate TOP5
      if (d.top5 && d.top5.length > 0) {
        updateTop5(d.top5);
      }
      // Populate enrichment
      if (d.type) {
        document.getElementById('enrichPanel').style.display = 'block';
        document.getElementById('enrichData').innerHTML =
          '<div class="enrich-item"><span class="key">扫描类型</span><span class="val">' + (d.type==='full'?'全量扫描':'盘中扫描') + '</span></div>' +
          '<div class="enrich-item"><span class="key">完成时间</span><span class="val">' + isoToLocalTime(d.time) + '</span></div>' +
          '<div class="enrich-item"><span class="key">平均分</span><span class="val">' + (d.avgScore||'--') + '</span></div>' +
          '<div class="enrich-item"><span class="key">最高分</span><span class="val">' + (d.maxScore||'--') + '</span></div>';
      }
      // Update header stats
      document.getElementById('statStocks').textContent = d.totalStocks || '--';
      document.getElementById('statCandidates').textContent = d.candidates || '--';
      document.getElementById('statAnalyzed').textContent = d.analyzed || '--';
      document.getElementById('statTopScore').textContent = d.maxScore || '--';
      // Show last result in thought stream
      updateIdleDisplay();
      // Add timeline entry
      addTimelineEntry(isoToLocalTime(d.time), '结果', 'scan',
        '加载上次' + (d.type==='full'?'全量':'盘中') + '扫描: ' +
        (d.totalStocks||'?') + '只→' + (d.candidates||'?') + '候选→' +
        (d.analyzed||'?') + '深析 | 均分' + (d.avgScore||0) + ' 最高' + (d.maxScore||0));
    } catch(ex) {}
  });

  // Save scan_complete records for persistence
  es.addEventListener('scan', function(e) {
    try {
      const d = JSON.parse(e.data);
      if (d.type === 'scan_complete') saveScanRecord('scan_complete', d);
    } catch(ex) {}
  });
  es.addEventListener('stats', function(e) {
    try { saveScanRecord('stats', JSON.parse(e.data)); } catch(ex) {}
  });
  es.addEventListener('stock', function(e) {
    try { saveScanRecord('stock_analyzed', JSON.parse(e.data)); } catch(ex) {}
  });

  // scan_start / scan_complete
  es.addEventListener('scan', function(e) {
    try {
      const d = JSON.parse(e.data);
      if (d.type === 'scan_start') {
        clearThoughtLog();
        factorCounts = {};
        updateFactorBars();
        document.getElementById('scoreDist').style.display = 'none';
        document.getElementById('enrichPanel').style.display = 'none';
        document.getElementById('top5Mini').style.display = 'none';
        document.getElementById('thoughtProgress').style.display = 'block';
        document.getElementById('thinkingLabel').textContent = '● 扫描启动';
        document.getElementById('thinkingContent').textContent =
          '启动量化扫描... 原因: ' + (d.reason || 'scheduled');
        addTimelineEntry(new Date().toTimeString().slice(0,8), '扫描', 'scan', '扫描启动: ' + (d.reason || ''));
      } else if (d.type === 'daily_summary') {
        document.getElementById('thinkingLabel').textContent = '📋 盘后总结已生成';
        document.getElementById('thinkingContent').innerHTML =
          '<span style="color:var(--green)">今日盘后总结报告已生成！</span><br>' +
          '<span style="color:var(--dim)">可在 Francis Investment 主面板查看完整报告</span>';
        addTimelineEntry(new Date().toTimeString().slice(0,8), '总结', 'scan',
          '盘后总结已生成: 资产¥' + ((d.summary && d.summary.portfolio) ? d.summary.portfolio.totalValue.toLocaleString() : '--') +
          ' | 交易' + ((d.summary && d.summary.tradeCount) || 0) + '笔');
      } else if (d.type === 'scan_complete') {
        document.getElementById('thoughtProgress').style.display = 'none';
        document.getElementById('thinkingLabel').textContent = '◆ 扫描完成';
        // Build lastResult from scan_complete data for idle display
        lastResult = {
          type: d.reason === 'mid_scan' ? 'mid' : 'full',
          time: d.time || new Date().toISOString(),
          totalStocks: d.totalStocks,
          candidates: d.candidates,
          analyzed: d.analyzed,
          top5: d.top5 || [],
          avgScore: d.avgScore,
          maxScore: d.maxScore,
        };
        if (d.top5 && d.top5.length > 0) {
          let topHtml = 'TOP5 推荐:<br>';
          for (const s of d.top5) {
            topHtml += '<span class="highlight">' + escHtml(s.name) + '</span>(' + s.code + ') ' +
              '<span style="color:var(--amber)">' + s.score + '分 ' + (s.rating||'') + '</span><br>';
          }
          document.getElementById('thinkingContent').innerHTML = topHtml;
          updateTop5(d.top5);
        } else {
          document.getElementById('thinkingContent').textContent =
            '分析完成。共扫描 ' + (d.totalStocks||'?') + ' 只股票，' +
            '深度分析 ' + (d.analyzed||'?') + ' 只，无TOP5推荐。';
        }
        document.getElementById('statStocks').textContent = d.totalStocks || '--';
        document.getElementById('statCandidates').textContent = d.candidates || '--';
        document.getElementById('statAnalyzed').textContent = d.analyzed || '--';
        addTimelineEntry(new Date().toTimeString().slice(0,8), '扫描', 'scan',
          '扫描完成: ' + (d.totalStocks||'?') + '只 → ' + (d.candidates||'?') + '候选 → ' +
          (d.analyzed||'?') + '深析' + (d.duration ? ' (' + d.duration + '秒)' : ''));
        renderScanRecords();
      }
    } catch(ex) {}
  });

  // progress
  es.addEventListener('progress', function(e) {
    try {
      const d = JSON.parse(e.data);
      document.getElementById('thoughtProgress').style.display = 'block';
      document.getElementById('progressBar').style.width = d.progress + '%';
      document.getElementById('progressStep').textContent = d.step || '';
      document.getElementById('progressPct').textContent = d.progress + '%';
      document.getElementById('thinkingLabel').textContent = '● 分析中';
    } catch(ex) {}
  });

  // enrichment
  es.addEventListener('enrichment', function(e) {
    try {
      const d = JSON.parse(e.data);
      document.getElementById('enrichPanel').style.display = 'block';
      const sentClass = d.nbSentiment === 'bullish' || d.nbSentiment === 'slightly_bullish' ? 'bullish' :
        (d.nbSentiment === 'bearish' ? 'bearish' : '');
      let html = '<div class="enrich-item"><span class="key">龙虎榜上榜</span><span class="val">' + (d.lhbCount||0) + ' 只</span></div>';
      html += '<div class="enrich-item"><span class="key">板块资金流</span><span class="val">' + (d.sectorCount||0) + ' 个板块</span></div>';
      html += '<div class="enrich-item"><span class="key">北向情绪</span><span class="val ' + sentClass + '">' + (d.nbSentiment||'N/A') + '</span></div>';
      if (d.topSectors && d.topSectors.length > 0) {
        html += '<div class="enrich-item"><span class="key">资金流入 TOP3</span><span class="val">' +
          d.topSectors.slice(0,3).map(s => escHtml(s.name) + ' ' + (s.netFlow>0?'+':'') + (s.netFlow/1e8).toFixed(1) + '亿').join(', ') +
          '</span></div>';
      }
      document.getElementById('enrichData').innerHTML = html;
      addTimelineEntry(new Date().toTimeString().slice(0,8), '情报', 'flow',
        '龙虎榜' + (d.lhbCount||0) + '只 | 北向' + (d.nbSentiment||'N/A') +
        (d.topSectors && d.topSectors.length > 0 ? ' | TOP板块: ' + d.topSectors[0].name : ''));
    } catch(ex) {}
  });

  // stock_analyzed
  es.addEventListener('stock', function(e) {
    try {
      const d = JSON.parse(e.data);
      // Update thought current
      let signalsHtml = '';
      if (d.signals && d.signals.length > 0) {
        signalsHtml = d.signals.map(s =>
          '<span class="signal-tag ' + s.level + '">' + s.name + '(' + s.level + ')</span>'
        ).join(' ');
      } else {
        signalsHtml = '<span style="color:var(--dim)">无信号触发</span>';
      }
      document.getElementById('thinkingContent').innerHTML =
        '分析 <span class="highlight">' + escHtml(d.name) + '</span> (' + d.code + ') ' +
        '[' + d.index + '/' + d.total + ']<br>' +
        '信号: ' + signalsHtml + '<br>' +
        '综合评分: <span style="color:var(--amber);font-weight:bold">' + (d.compositeScore||'--') + '分</span> ' +
        '<span style="color:var(--dim)">' + (d.rating||'') + '级</span>';

      document.getElementById('progressBar').style.width = Math.round(d.index / d.total * 100) + '%';
      document.getElementById('progressStep').textContent = d.name + ' (' + d.index + '/' + d.total + ')';
      document.getElementById('progressPct').textContent = Math.round(d.index / d.total * 100) + '%';

      // Update factor counts
      if (d.signals) {
        for (const s of d.signals) {
          factorCounts[s.id] = (factorCounts[s.id] || 0) + 1;
        }
        updateFactorBars();
      }

      // Add to thought log
      const signalDesc = d.signals && d.signals.length > 0
        ? d.signals.map(s => s.name).join('+')
        : '无信号';
      addThoughtEntry(
        '<div class="thought-entry">' +
        '<span class="time">' + new Date().toTimeString().slice(0,8) + '</span>' +
        '[' + d.index + '/' + d.total + '] ' +
        '<span class="code">' + escHtml(d.name) + '</span>' +
        ' 信号: ' + signalDesc +
        ' <span class="score">' + (d.compositeScore||'--') + '分 ' + (d.rating||'') + '</span>' +
        '</div>'
      );

      // Update top score
      const currentTop = document.getElementById('statTopScore').textContent;
      if (currentTop === '--' || (d.compositeScore || 0) > parseInt(currentTop)) {
        document.getElementById('statTopScore').textContent = d.compositeScore || '--';
      }
    } catch(ex) {}
  });

  // factor_stats
  es.addEventListener('stats', function(e) {
    try {
      const d = JSON.parse(e.data);
      if (d.signalCounts) {
        factorCounts = d.signalCounts;
        updateFactorBars();
      }
      if (d.scoreDistribution) {
        updateScoreDist(d.scoreDistribution);
      }
      document.getElementById('statTopScore').textContent = d.maxScore || '--';
      addTimelineEntry(new Date().toTimeString().slice(0,8), '统计', 'factor',
        '因子统计: 均分' + (d.avgScore||0) + ' 最高' + (d.maxScore||0) +
        ' | 分布: <50=' + ((d.scoreDistribution||{}).lt50||0) +
        ' 50-60=' + ((d.scoreDistribution||{}).r50_60||0) +
        ' 60-70=' + ((d.scoreDistribution||{}).r60_70||0) +
        ' 70-80=' + ((d.scoreDistribution||{}).r70_80||0) +
        ' 80+=' + ((d.scoreDistribution||{}).gt80||0));
    } catch(ex) {}
  });

  // factor_perf — factor performance tracking
  es.addEventListener('factor_perf', function(e) {
    try {
      const d = JSON.parse(e.data);
      renderFactorPerformance(d);
    } catch(ex) {}
  });

  // trade
  es.addEventListener('trade', function(e) {
    try {
      const d = JSON.parse(e.data);
      if (d.type === 'trade_executed') {
        const actionLabel = d.action === 'buy' ? '买入' : '卖出';
        const actionColor = d.action === 'buy' ? 'var(--green)' : 'var(--red)';
        document.getElementById('thinkingContent').innerHTML =
          '<span style="color:' + actionColor + ';font-weight:bold">' + actionLabel + '!</span> ' +
          escHtml(d.name) + '(' + d.code + ') ' +
          d.shares + '股 @' + fmtPrice(d.price) +
          (d.reason ? ' <span style="color:var(--dim)">' + escHtml(d.reason) + '</span>' : '');
        var tradeTime2 = d.time ? isoToLocalTime(d.time) : new Date().toTimeString().slice(0,8);
        addTimelineEntry(tradeTime2, actionLabel, 'trade',
          actionLabel + ' ' + escHtml(d.name) + '(' + d.code + ') ' + d.shares + '股 @' + fmtPrice(d.price) +
          (d.reason ? ' — ' + d.reason : ''));
      } else if (d.type === 'trade_skip') {
        document.getElementById('thinkingContent').innerHTML =
          '<span style="color:var(--dim)">无交易决策</span> — ' +
          '分析了' + (d.analyzedCount||'?') + '只股票，无触发买入阈值的标的。';
        addTimelineEntry(d.time ? isoToLocalTime(d.time) : new Date().toTimeString().slice(0,8),
          '跳过', 'trade', '无交易: 分析了' + (d.analyzedCount||'?') + '只，无触发阈值 — ' + (d.reason||''));
      }
    } catch(ex) {}
  });

  // position
  es.addEventListener('position', function(e) {
    try {
      const d = JSON.parse(e.data);
      updatePositionBar(d);
      if (d.positions && d.positions.length > 0) {
        for (const p of d.positions) {
          const pnlSign = p.pnlPct >= 0 ? '+' : '';
          addTimelineEntry(d.time ? isoToLocalTime(d.time) : new Date().toTimeString().slice(0,8),
            '持仓', 'state',
            escHtml(p.name) + ' @' + fmtPrice(p.currentPrice) + ' ' + pnlSign + p.pnlPct.toFixed(2) + '%');
        }
      }
    } catch(ex) {}
  });

  // state
  es.addEventListener('state', function(e) {
    try {
      const d = JSON.parse(e.data);
      updateStateUI(d.to);
      addTimelineEntry(d.time ? isoToLocalTime(d.time) : new Date().toTimeString().slice(0,8),
        '状态', 'state',
        (STATE_LABELS[d.from] || d.from) + ' → ' + (STATE_LABELS[d.to] || d.to) +
        (d.reason ? ' (' + d.reason + ')' : ''));
    } catch(ex) {}
  });

  // alert
  es.addEventListener('alert', function(e) {
    try {
      const d = JSON.parse(e.data);
      addTimelineEntry(d.time ? isoToLocalTime(d.time) : new Date().toTimeString().slice(0,8),
        '风控', 'alert', escHtml(d.name||d.code||'') + ' ' + (d.message||''));
    } catch(ex) {}
  });

  // Generic / untyped events fallback
  es.onmessage = function(e) {
    // Ignore untyped messages; all our events have types
  };

  es.onerror = function() {
    addTimelineEntry(new Date().toTimeString().slice(0,8), '连接', 'alert', 'SSE 连接中断，自动重连中...');
    // Update the idle display to show reconnecting state
    if (!lastResult) {
      document.getElementById('thinkingLabel').textContent = '● 重连中';
      document.getElementById('thinkingContent').textContent = 'SSE 连接中断，正在自动重连...';
    }
  };

  return es;
}

// ---- Calendar-Timeline Sync ----
// When think-tank.html loads, check localStorage for a selected date from the main page
function syncTimelineWithCalendar() {
  try {
    var calDate = localStorage.getItem('franciz_selected_date');
    if (calDate) {
      var select = document.getElementById('eventDateSelect');
      if (select) {
        // Check if this date is in the dropdown
        var found = false;
        for (var i = 0; i < select.options.length; i++) {
          if (select.options[i].value === calDate) {
            found = true;
            break;
          }
        }
        if (found) {
          select.value = calDate;
          onEventDateChange(calDate);
        }
      }
      localStorage.removeItem('franciz_selected_date');
    }
  } catch(e) {}
}

// ---- Initial Data Load (REST, instant before SSE connects) ----
function loadInitialData() {
  fetch('/api/think-tank/initial')
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (!data.ok) return;
      initialDataLoaded = true;

      // Update state UI
      if (data.scheduler) {
        updateStateUI(data.scheduler.state);
        // Update next scan info
        var now = new Date();
        var scanSchedule = [
          { h: 9, m: 30, label: '全量扫描' },
          { h: 10, m: 0, label: '盘中扫描' },
          { h: 10, m: 30, label: '盘中扫描' },
          { h: 11, m: 0, label: '全量扫描' },
          { h: 11, m: 25, label: '盘中扫描' },
          { h: 13, m: 0, label: '全量扫描' },
          { h: 13, m: 30, label: '盘中扫描' },
          { h: 14, m: 0, label: '盘中扫描' },
          { h: 14, m: 30, label: '盘中扫描' },
          { h: 14, m: 50, label: '盘中扫描' },
        ];
        for (var si = 0; si < scanSchedule.length; si++) {
          var t = new Date(now.getFullYear(), now.getMonth(), now.getDate(), scanSchedule[si].h, scanSchedule[si].m, 0);
          if (t > now) {
            nextScanInfo = { time: t, label: scanSchedule[si].label, diffMin: Math.max(0, Math.round((t - now) / 60000)) };
            break;
          }
        }
      }

      // Populate last pipeline result
      if (data.lastResult && data.lastResult.top5 && data.lastResult.top5.length > 0) {
        lastResult = data.lastResult;
        if (data.lastResult.signalCounts) {
          factorCounts = data.lastResult.signalCounts;
          updateFactorBars();
        }
        if (data.lastResult.scoreDistribution) {
          updateScoreDist(data.lastResult.scoreDistribution);
        }
        updateTop5(data.lastResult.top5 || []);
        document.getElementById('enrichPanel').style.display = 'block';
        document.getElementById('enrichData').innerHTML =
          '<div class="enrich-item"><span class="key">扫描类型</span><span class="val">' + (data.lastResult.type==='full'?'全量扫描':'盘中扫描') + '</span></div>' +
          '<div class="enrich-item"><span class="key">完成时间</span><span class="val">' + isoToLocalTime(data.lastResult.time) + '</span></div>' +
          '<div class="enrich-item"><span class="key">平均分</span><span class="val">' + (data.lastResult.avgScore||'--') + '</span></div>' +
          '<div class="enrich-item"><span class="key">最高分</span><span class="val">' + (data.lastResult.maxScore||'--') + '</span></div>';
        document.getElementById('statStocks').textContent = data.lastResult.totalStocks || '--';
        document.getElementById('statCandidates').textContent = data.lastResult.candidates || '--';
        document.getElementById('statAnalyzed').textContent = data.lastResult.analyzed || '--';
        document.getElementById('statTopScore').textContent = data.lastResult.maxScore || '--';
        document.getElementById('thinkingLabel').textContent = '◆ 上次扫描结果';
        var topHtml = 'TOP5: ';
        for (var ti = 0; ti < Math.min(3, data.lastResult.top5.length); ti++) {
          var s = data.lastResult.top5[ti];

                top5: top5Parsed,
                avgScore: 0,

// ---- Scan Record Persistence (localStorage, auto-clear at midnight) ----
const STORAGE_KEY = 'franciz_scan_records';

function getDateKey() {
  return new Date().toISOString().slice(0, 10);
}

function syncServerScanRecords(records) {
  try {
    var dateKey = getDateKey();
    var store = { dateKey: dateKey, records: [] };
    for (var i = 0; i < records.length; i++) {
      store.records.push({
        type: 'scan_complete',
        data: {
          type: records[i].scanType || 'full',
          totalStocks: records[i].totalStocks,
          candidates: records[i].candidates,
          analyzed: records[i].analyzed,
          top5: records[i].top5 || [],
          avgScore: records[i].avgScore,
          maxScore: records[i].maxScore,
        },
        time: records[i].time,
      });
    }
    localStorage.setItem(STORAGE_KEY, JSON.stringify(store));
  } catch(e) {}
}

function saveScanRecord(type, data) {
  try {
    var dateKey = getDateKey();
    var store = { dateKey: dateKey, records: [] };
    try {
      var existing = localStorage.getItem(STORAGE_KEY);
      if (existing) {
        var parsed = JSON.parse(existing);
        if (parsed.dateKey === dateKey) {
          store = parsed;
        }
      }
    } catch(e) {}
    store.records.push({
      type: type,
      data: data,
      time: new Date().toISOString(),
    });
    if (store.records.length > 50) store.records = store.records.slice(-50);
    localStorage.setItem(STORAGE_KEY, JSON.stringify(store));
    renderScanRecords();
  } catch(e) {/* silent */}
}

function loadScanRecords() {
  try {
    var dateKey = getDateKey();
    var raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return [];
    var store = JSON.parse(raw);
    if (store.dateKey !== dateKey) {
      localStorage.removeItem(STORAGE_KEY);
      return [];
    }
    return store.records || [];
  } catch(e) { return []; }
}

function renderScanRecords() {
  var list = document.getElementById('scanRecordsList');
  var count = document.getElementById('scanRecordsCount');
  if (!list || !count) return;
  var records = loadScanRecords();
  var scanRecords = [];
  for (var i = 0; i < records.length; i++) {
    if (records[i].type === 'scan_complete') scanRecords.push(records[i]);
  }
  count.textContent = scanRecords.length + ' 条';
  if (scanRecords.length === 0) {
    list.innerHTML = '<div style="color:var(--dim);text-align:center;padding:8px;">暂无扫描记录</div>';
    return;
  }
  // Sort newest last
  scanRecords.sort(function(a, b) { return (a.time || '').localeCompare(b.time || ''); });
  var html = '';
  for (var r = 0; r < scanRecords.length; r++) {
    var d = scanRecords[r].data;
    var recordTime = scanRecords[r].time;
    var time;
    try {
      time = new Date(recordTime).toTimeString().slice(0, 5);
      // toTimeString returns local time; but server times are CST (UTC+8), so if stored as ISO UTC, convert
      var d2 = new Date(recordTime);
      time = ('0' + d2.getHours()).slice(-2) + ':' + ('0' + d2.getMinutes()).slice(-2);
      // Server sends CST time in ISO format; if ends with Z, it's UTC; check
      if (recordTime && recordTime.slice(-1) === 'Z') {
        // UTC time; convert to CST (UTC+8)
        d2 = new Date(recordTime);
        d2.setHours(d2.getHours() + 8);
        time = ('0' + d2.getHours()).slice(-2) + ':' + ('0' + d2.getMinutes()).slice(-2);
      }
    } catch(e) { time = '--:--'; }
    var label = (d.type === 'full' || d.scanType === 'full') ? '全量扫描' : '盘中扫描';
    var countInfo = (d.analyzed || '?') + ' 只';
    html += '<div style="display:flex;justify-content:space-between;padding:3px 8px;border-bottom:1px solid rgba(26,37,64,0.3);">' +
      '<span style="color:var(--dim)">' + time + '</span>' +
      '<span style="color:var(--cyan);font-weight:bold">' + label + '</span>' +
      '<span style="color:var(--text-bright)">' + countInfo + '</span></div>';
  }
  list.innerHTML = html;
}

function restoreStateFromStorage() {
  const records = loadScanRecords();
  if (records.length === 0) return false;

  // Find the last scan_complete record to restore Top5, scores, etc.
  let lastComplete = null;
  let lastStats = null;
  for (let i = records.length - 1; i >= 0; i--) {
    const r = records[i];
    if (r.type === 'scan_complete' && !lastComplete) lastComplete = r.data;
    if (r.type === 'stats' && !lastStats) lastStats = r.data;
  }

  if (lastComplete) {
    if (lastComplete.top5 && lastComplete.top5.length > 0) {
      updateTop5(lastComplete.top5);
      lastResult = {
        type: lastComplete.type || 'full',
        time: lastComplete.time || new Date().toISOString(),
        totalStocks: lastComplete.totalStocks,
        candidates: lastComplete.candidates,
        analyzed: lastComplete.analyzed,
        top5: lastComplete.top5,
        avgScore: lastComplete.avgScore,
        maxScore: lastComplete.maxScore,
      };
    }
    document.getElementById('statStocks').textContent = lastComplete.totalStocks || '--';
    document.getElementById('statCandidates').textContent = lastComplete.candidates || '--';
    document.getElementById('statAnalyzed').textContent = lastComplete.analyzed || '--';
    document.getElementById('statTopScore').textContent = lastComplete.maxScore || '--';
  }
  if (lastStats) {
    if (lastStats.signalCounts) {
      factorCounts = lastStats.signalCounts;
      updateFactorBars();
    }
    if (lastStats.scoreDistribution) {
      updateScoreDist(lastStats.scoreDistribution);
    }
  }

  // Restore thought log entries
  if (records.length > 0) {
    const logEntries = [];
    for (const r of records) {
      if (r.type === 'stock_analyzed' && r.data) {
        const d = r.data;
        const signalDesc = d.signals && d.signals.length > 0
          ? d.signals.map(s => s.name).join('+')
          : '无信号';
        logEntries.push(
          '<div class="thought-entry">' +
          '<span class="time">' + (d.time ? new Date(d.time).toTimeString().slice(0,8) : '--:--:--') + '</span>' +
          '[' + d.index + '/' + d.total + '] ' +
          '<span class="code">' + escHtml(d.name) + '</span>' +
          ' 信号: ' + signalDesc +
          ' <span class="score">' + (d.compositeScore||'--') + '分 ' + (d.rating||'') + '</span>' +
          '</div>'
        );
      }
    }
    if (logEntries.length > 0) {
      thoughtEntries = logEntries;
      document.getElementById('thoughtLog').innerHTML = thoughtEntries.join('');
      document.getElementById('thinkingLabel').textContent = '◆ 上次扫描结果（已恢复）';
      document.getElementById('thinkingContent').innerHTML =
        '已从本地存储恢复 ' + logEntries.length + ' 条扫描记录';
    }
    return true;
  }
  return false;
}

function mapEventTag(type) {
  const m = {
    pipeline_start: '扫描', pipeline_complete: '扫描', pipeline_error: '扫描', pipeline_timeout: '超时', pipeline_skip: '跳过',
    midscan_start: '扫描', midscan_complete: '扫描', midscan_error: '扫描', midscan_skip: '跳过',
    trade_executed: '交易', trade_complete: '交易', trade_skip: '跳过', trade_error: '错误',
    state_change: '状态', risk_trade: '风控', risk_trade_error: '错误',
    scheduler_start: '系统', scheduler_stop: '系统',
    position_monitor_fetch_fail: '警报', position_monitor_error: '错误',
    position_refresh: '刷新', post_market_wrapup: '收盘', wrapup_error: '错误',
    daily_summary_start: '总结', daily_summary_complete: '总结', daily_summary_error: '错误',
    new_day: '新日',
  };
  return m[type] || '信息';
}

function mapEventClass(type) {
  if (type.includes('trade')) return 'trade';
  if (type.includes('scan') || type.includes('pipeline')) return 'scan';
  if (type.includes('risk') || type.includes('alert') || type.includes('error')) return 'alert';
  if (type.includes('summary') || type.includes('wrapup')) return 'scan';
  if (type.includes('state') || type.includes('position') || type.includes('new_day')) return 'state';
  return 'state';
}

function formatEventMsg(evt) {
  const d = evt.detail || {};
  switch (evt.type) {
    case 'pipeline_complete':
      return '扫描完成: ' + (d.totalStocks||'?') + '只 → ' + (d.candidates||'?') + '候选 → ' +
        (d.analyzed||'?') + '深析，TOP5: ' + (d.top5||[]).join(', ') + ' (' + (d.duration||'?') + 's)';
    case 'pipeline_start':
      return '全量扫描启动: ' + (d.reason || '');
    case 'midscan_start':
      return '盘中扫描启动';
    case 'midscan_complete':
      return '盘中扫描完成: ' + (d.deepAnalyzed||'?') + '只深析';
    case 'trade_executed':

        (d.shares||'?') + '股 @' + (d.price||'?') + ' — ' + (d.reason||'');
    case 'trade_complete':

// ---- Factor Performance Tracking ----

var factorPerformance = null;

function renderFactorPerformance(perfData) {
  try {
    if (!perfData || !perfData.factors || perfData.factors.length === 0) return;
    factorPerformance = perfData;

    var section = document.getElementById('factorPerfSection');
    var grid = document.getElementById('factorPerfGrid');
    if (!section || !grid) return;

    var tsEl = document.getElementById('perfUpdatedAt');
    if (tsEl && perfData.summary) {
      var t = perfData.summary.updatedAt || '';
      tsEl.textContent = t ? '更新 ' + isoToLocalTime(t) : '';
    }

    var html = '';
    for (var i = 0; i < perfData.factors.length; i++) {
      var f = perfData.factors[i];
      var statusCls = f.status || 'stable';
      var statusLabel = { hot: 'HOT', stable: '--', cold: 'COLD' }[statusCls] || '--';
      var cardCls = 'fp-card entering' + (statusCls === 'hot' ? ' hot' : '') + (statusCls === 'cold' ? ' cold' : '');
      var returnStr = f.avgReturn != null
        ? (f.avgReturn >= 0 ? '+' : '') + f.avgReturn.toFixed(2) + '%'
        : '--';
      var returnClr = f.avgReturn != null ? (f.avgReturn >= 0 ? 'var(--red)' : 'var(--green)') : 'var(--dim)';
      var trendArrow = f.trend === 'improving' ? ' <span style=\"color:var(--green)\">▲</span>' :
                       f.trend === 'declining' ? ' <span style=\"color:var(--red)\">▼</span>' : '';

      html += '<div class=\"' + cardCls + '\" style=\"animation-delay:' + (i * 50) + 'ms\" id=\"fp-card-' + f.id + '\">' +
        '<div class=\"fp-name\">' + escHtml(f.name) + '</div>' +
        '<div class=\"fp-id\">' + f.id + '</div>' +
        '<canvas id=\"fp-gauge-' + f.id + '\" width=\"52\" height=\"52\" style=\"width:52px;height:52px;\"></canvas>' +
        '<canvas id=\"fp-spark-' + f.id + '\" width=\"78\" height=\"18\" style=\"width:78px;height:18px;\"></canvas>' +
        '<div class=\"fp-return\" style=\"color:' + returnClr + '\">' + returnStr + trendArrow + '</div>' +
        '<div class=\"fp-count\">信号 ' + (f.signalCount || 0) + ' 次</div>' +
        '<span class=\"fp-status ' + statusCls + '\">' + statusLabel + '</span>' +
        '</div>';
    }
    grid.innerHTML = html;

    // Draw gauges and sparklines after DOM insertion (nested RAF + setTimeout for reliability)
    requestAnimationFrame(function() {
      requestAnimationFrame(function() {
        for (var j = 0; j < perfData.factors.length; j++) {
          var f = perfData.factors[j];
          setTimeout((function(factor) {
            return function() {
              drawFactorGauge('fp-gauge-' + factor.id, factor.hitRate || 0, factor.status);
              drawFactorSparkline('fp-spark-' + factor.id, factor.signalHistory || []);
            };
          })(f), j * 80);
        }
      });
    });
  } catch(e) {
    var grid2 = document.getElementById('factorPerfGrid');
    if (grid2) grid2.innerHTML = '<div style=\"color:var(--red);padding:8px;\">Error: ' + e.message + '</div>';
  }
}

function drawFactorGauge(canvasId, hitRate, status) {
  var canvas = document.getElementById(canvasId);
  if (!canvas) return;
  var ctx = canvas.getContext('2d');
  var dpr = window.devicePixelRatio || 1;
  var size = 52;
  canvas.width = size * dpr;
  canvas.height = size * dpr;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

  var cx = size / 2, cy = size / 2;
  var radius = 20;
  var lineWidth = 3.5;
  var startAngle = -Math.PI * 0.72;
  var endAngle = Math.PI * 0.72;
  var totalAngle = endAngle - startAngle;

  var color;
  if (hitRate >= 0.55) color = '#00e676';
  else if (hitRate >= 0.40) color = '#ffb800';
  else color = '#ff3b4a';

  // Animate gauge fill
  var targetRate = Math.max(0, Math.min(1, hitRate));
  var currentRate = parseFloat(canvas.dataset.currentRate) || 0;
  if (isNaN(currentRate)) currentRate = 0;
  canvas.dataset.targetRate = targetRate;

  function animateFill() {
    currentRate += (targetRate - currentRate) * 0.1;
    if (Math.abs(targetRate - currentRate) < 0.003) currentRate = targetRate;

    ctx.clearRect(0, 0, size, size);

    // Background arc
    ctx.beginPath();
    ctx.arc(cx, cy, radius, startAngle, endAngle);
    ctx.strokeStyle = 'rgba(26,37,64,0.8)';
    ctx.lineWidth = lineWidth;
    ctx.lineCap = 'round';
    ctx.stroke();

    // Filled arc
    var fillAngle = startAngle + totalAngle * currentRate;
    ctx.beginPath();
    ctx.arc(cx, cy, radius, startAngle, fillAngle);
    ctx.strokeStyle = color;
    ctx.shadowColor = color;
    ctx.shadowBlur = (status === 'hot' && currentRate > 0.5) ? 8 : 2;
    ctx.lineWidth = lineWidth;
    ctx.lineCap = 'round';
    ctx.stroke();
    ctx.shadowBlur = 0;

    // Center percentage text
    ctx.fillStyle = '#e0e8f0';
    ctx.font = 'bold 13px "Consolas","Courier New",monospace';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(Math.round(currentRate * 100) + '%', cx, cy);

    canvas.dataset.currentRate = currentRate;

    if (Math.abs(targetRate - currentRate) > 0.003) {
      requestAnimationFrame(animateFill);
    }
  }
  animateFill();
}

function drawFactorSparkline(canvasId, values) {
  var canvas = document.getElementById(canvasId);
  if (!canvas) return;
  var ctx = canvas.getContext('2d');
  var dpr = window.devicePixelRatio || 1;
  var W = 78, H = 18;
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

  if (!values || values.length < 2) {
    ctx.fillStyle = 'rgba(160,170,190,0.3)';
    ctx.font = '8px monospace';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('数据不足', W / 2, H / 2);
    return;
  }

  var maxVal = Math.max.apply(null, values);
  var minVal = Math.min.apply(null, values);
  var range = maxVal - minVal || 1;
  var padT = 2, padB = 2, padL = 2, padR = 2;
  var plotW = W - padL - padR;
  var plotH = H - padT - padB;

  function xFor(i) { return padL + (i / (values.length - 1)) * plotW; }
  function yFor(v) { return padT + (1 - (v - minVal) / range) * plotH; }

  // Fill area
  ctx.beginPath();
  ctx.moveTo(xFor(0), H - padB);
  for (var i = 0; i < values.length; i++) {
    ctx.lineTo(xFor(i), yFor(values[i]));
  }
  ctx.lineTo(xFor(values.length - 1), H - padB);
  ctx.closePath();
  var gradient = ctx.createLinearGradient(0, padT, 0, H);
  gradient.addColorStop(0, 'rgba(0,212,255,0.20)');
  gradient.addColorStop(1, 'rgba(0,212,255,0.01)');
  ctx.fillStyle = gradient;
  ctx.fill();

  // Line
  ctx.beginPath();
  ctx.moveTo(xFor(0), yFor(values[0]));
  for (var j = 1; j < values.length; j++) {
    ctx.lineTo(xFor(j), yFor(values[j]));
  }
  ctx.strokeStyle = 'rgba(0,212,255,0.75)';
  ctx.lineWidth = 1;
  ctx.lineJoin = 'round';
  ctx.stroke();

  // Dot at last point
  var lx = xFor(values.length - 1);
  var ly = yFor(values[values.length - 1]);
  ctx.fillStyle = '#00d4ff';
  ctx.beginPath();
  ctx.arc(lx, ly, 1.8, 0, Math.PI * 2);
  ctx.fill();
}

function updateTop5(list) {
  document.getElementById('top5Mini').style.display = 'block';
  // Update timestamp
  var tsEl = document.getElementById('top5Timestamp');
  if (tsEl) {
    var now = new Date();
    var y = now.getFullYear();
    var m = String(now.getMonth() + 1).padStart(2, '0');
    var d = String(now.getDate()).padStart(2, '0');
    var h = String(now.getHours()).padStart(2, '0');
    var min = String(now.getMinutes()).padStart(2, '0');
    tsEl.textContent = y + '-' + m + '-' + d + ' ' + h + ':' + min;
  }
  let html = '';
  for (let i = 0; i < list.length; i++) {
    const s = list[i];
    html += '<div class="top5-row">' +
      '<span class="top5-rank r' + (i+1) + '">#' + (i+1) + '</span>' +
      '<span class="top5-name">' + escHtml(s.name) + '</span>' +
      '<span class="top5-code">' + s.code + '</span>' +
      '<span class="top5-score">' + s.score + '分 ' + (s.rating||'') + '</span>' +
      '</div>';
  }
  document.getElementById('top5Data').innerHTML = html;
}
