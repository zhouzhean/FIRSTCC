<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>电子日历</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    background: #0a0a0a;
    font-family: 'Orbitron', monospace;
    overflow: hidden;
  }

  /* ---- scanlines ---- */
  body::after {
    content: '';
    position: fixed; inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,.15) 2px,
      rgba(0,0,0,.15) 4px
    );
    pointer-events: none; z-index: 999;
  }

  /* ---- ambient glow ---- */
  .ambient {
    position: fixed;
    width: 600px; height: 600px;
    border-radius: 50%;
    filter: blur(180px);
    opacity: .12;
    pointer-events: none; z-index: 0;
  }
  .ambient.a1 { top: -200px; left: -200px; background: #00ffff; }
  .ambient.a2 { bottom: -200px; right: -200px; background: #ff00ff; }

  /* ---- main card ---- */
  .calendar {
    position: relative; z-index: 1;
    width: 520px; max-width: 95vw;
    padding: 2rem 2rem 1.5rem;
    background: rgba(8,8,12,.92);
    border: 2px solid rgba(0,255,255,.25);
    border-radius: 6px;
    box-shadow:
      0 0 30px rgba(0,255,255,.08),
      inset 0 0 60px rgba(0,0,0,.5);
    clip-path: inset(0 round 6px);
  }

  /* ---- header ---- */
  .header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 1.5rem;
  }

  .nav-btn {
    background: transparent;
    border: 1px solid rgba(0,255,255,.4);
    color: #00ffff;
    font-family: 'Orbitron', monospace;
    font-size: 1.2rem; font-weight: 700;
    width: 44px; height: 44px;
    cursor: pointer;
    border-radius: 3px;
    transition: all .2s;
    text-shadow: 0 0 6px #00ffff;
  }
  .nav-btn:hover {
    border-color: #00ffff;
    box-shadow: 0 0 16px rgba(0,255,255,.35), inset 0 0 10px rgba(0,255,255,.08);
    background: rgba(0,255,255,.06);
  }
  .nav-btn:active { transform: scale(.93); }

  .month-year {
    font-size: 1.5rem; font-weight: 900;
    color: #00ffff;
    text-shadow:
      0 0 10px #00ffff,
      0 0 30px rgba(0,255,255,.4),
      0 0 50px rgba(0,255,255,.15);
    letter-spacing: 4px;
    text-transform: uppercase;
    user-select: none;
  }

  /* ---- weekdays ---- */
  .weekdays {
    display: grid; grid-template-columns: repeat(7, 1fr);
    text-align: center;
    margin-bottom: .5rem;
  }
  .weekdays span {
    font-size: .75rem; font-weight: 700;
    color: rgba(0,255,255,.55);
    text-shadow: 0 0 4px rgba(0,255,255,.3);
    letter-spacing: 2px;
    padding: .4rem 0;
  }
  .weekdays span:first-child,
  .weekdays span:last-child {
    color: #ff00ff;
    text-shadow: 0 0 5px rgba(255,0,255,.4);
  }

  /* ---- days grid ---- */
  .days {
    display: grid; grid-template-columns: repeat(7, 1fr);
    gap: 3px;
  }
  .day {
    aspect-ratio: 1 / 1;
    display: flex; align-items: center; justify-content: center;
    font-size: 1rem; font-weight: 700;
    color: rgba(255,255,255,.75);
    border: 1px solid transparent;
    border-radius: 3px;
    cursor: default;
    transition: all .18s;
    position: relative;
    text-shadow: 0 0 3px rgba(255,255,255,.2);
    user-select: none;
  }
  .day.other-month { color: rgba(255,255,255,.18); }
  .day:not(.other-month):hover {
    border-color: rgba(0,255,255,.5);
    color: #00ffff;
    text-shadow: 0 0 10px #00ffff, 0 0 20px rgba(0,255,255,.5);
    box-shadow: 0 0 12px rgba(0,255,255,.15), inset 0 0 8px rgba(0,255,255,.06);
    transform: translateY(-1px);
  }
  .day.today {
    border: 1px solid rgba(57,255,20,.5);
    color: #39ff14;
    text-shadow: 0 0 10px #39ff14, 0 0 24px rgba(57,255,20,.5);
    box-shadow: 0 0 14px rgba(57,255,20,.12), inset 0 0 8px rgba(57,255,20,.06);
  }
  .day.today:hover {
    border-color: #39ff14;
    box-shadow: 0 0 22px rgba(57,255,20,.25), inset 0 0 14px rgba(57,255,20,.1);
  }

  /* ---- clock ---- */
  .clock-section {
    margin-top: 1.5rem;
    padding-top: 1rem;
    border-top: 1px solid rgba(0,255,255,.12);
    display: flex; align-items: center; justify-content: center;
    gap: 6px;
  }
  .clock-digit {
    font-family: 'Orbitron', monospace;
    font-size: 2rem; font-weight: 900;
    color: #ff00ff;
    text-shadow:
      0 0 8px #ff00ff,
      0 0 20px rgba(255,0,255,.4),
      0 0 40px rgba(255,0,255,.15);
    letter-spacing: 1px;
    min-width: 2.2rem; text-align: center;
  }
  .clock-colon {
    font-size: 1.5rem;
    color: rgba(255,0,255,.5);
    animation: blink 1s step-end infinite;
    text-shadow: 0 0 6px rgba(255,0,255,.3);
  }
  @keyframes blink {
    50% { opacity: .15; }
  }
  .clock-date {
    font-size: .7rem; color: rgba(255,255,255,.35);
    letter-spacing: 3px;
    margin-left: .8rem;
  }

  /* ---- corner decorations ---- */
  .corner {
    position: absolute;
    width: 14px; height: 14px;
    border-color: rgba(0,255,255,.5);
    border-style: solid;
    z-index: 2;
  }
  .corner.tl { top: 8px; left: 8px; border-width: 1px 0 0 1px; }
  .corner.tr { top: 8px; right: 8px; border-width: 1px 1px 0 0; }
  .corner.bl { bottom: 8px; left: 8px; border-width: 0 0 1px 1px; }
  .corner.br { bottom: 8px; right: 8px; border-width: 0 1px 1px 0; }

  /* ---- glitch title ---- */
  .glitch-title {
    position: absolute; top: -14px; left: 20px;
    background: #0a0a0a;
    padding: 0 10px;
    font-size: .6rem; font-weight: 700;
    letter-spacing: 4px;
    color: rgba(0,255,255,.5);
    text-shadow: 0 0 5px rgba(0,255,255,.3);
    z-index: 2;
  }
</style>
</head>
<body>

<div class="ambient a1"></div>
<div class="ambient a2"></div>

<div class="calendar">
  <div class="corner tl"></div><div class="corner tr"></div>
  <div class="corner bl"></div><div class="corner br"></div>
  <div class="glitch-title">CALENDAR</div>

  <div class="header">
    <button class="nav-btn" id="prevBtn">&lt;</button>
    <div class="month-year" id="monthYear"></div>
    <button class="nav-btn" id="nextBtn">&gt;</button>
  </div>

  <div class="weekdays">
    <span>日</span><span>一</span><span>二</span><span>三</span>
    <span>四</span><span>五</span><span>六</span>
  </div>

  <div class="days" id="daysGrid"></div>

  <div class="clock-section">
    <span class="clock-digit" id="h1">0</span>
    <span class="clock-digit" id="h2">0</span>
    <span class="clock-colon">:</span>
    <span class="clock-digit" id="m1">0</span>
    <span class="clock-digit" id="m2">0</span>
    <span class="clock-colon">:</span>
    <span class="clock-digit" id="s1">0</span>
    <span class="clock-digit" id="s2">0</span>
    <span class="clock-date" id="clockDate"></span>
  </div>
</div>

<script>
  (function() {
    const monthYearEl = document.getElementById('monthYear');
    const daysGrid = document.getElementById('daysGrid');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');

    let current = new Date();
    const today = new Date();
    today.setHours(0, 0, 0, 0);

    const MONTHS = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];

    function render(year, month) {
      monthYearEl.textContent = MONTHS[month] + ' ' + year.toString().padStart(4, '0');

      const firstDay = new Date(year, month, 1).getDay();
      const daysInMonth = new Date(year, month + 1, 0).getDate();
      const daysInPrev = new Date(year, month, 0).getDate();

      let html = '';
      // previous month tail
      for (let i = firstDay - 1; i >= 0; i--) {
        html += `<div class="day other-month">${daysInPrev - i}</div>`;
      }
      // current month
      for (let d = 1; d <= daysInMonth; d++) {
        const isToday = year === today.getFullYear() &&
                        month === today.getMonth() &&
                        d === today.getDate();
        html += `<div class="day${isToday ? ' today' : ''}">${d}</div>`;
      }
      // next month head
      const remaining = 42 - (firstDay + daysInMonth);
      for (let d = 1; d <= remaining; d++) {
        html += `<div class="day other-month">${d}</div>`;
      }

      daysGrid.innerHTML = html;
    }

    function navigate(delta) {
      current.setMonth(current.getMonth() + delta);
      render(current.getFullYear(), current.getMonth());
    }

    prevBtn.addEventListener('click', function() { navigate(-1); });
    nextBtn.addEventListener('click', function() { navigate(1); });

    // keyboard nav
    document.addEventListener('keydown', function(e) {
      if (e.key === 'ArrowLeft') navigate(-1);
      if (e.key === 'ArrowRight') navigate(1);
    });

    // ---- clock ----
    function pad2(n) { return n.toString().padStart(2, '0').split(''); }

    function updateClock() {
      var now = new Date();
      var h = pad2(now.getHours());
      var m = pad2(now.getMinutes());
      var s = pad2(now.getSeconds());
      document.getElementById('h1').textContent = h[0];
      document.getElementById('h2').textContent = h[1];
      document.getElementById('m1').textContent = m[0];
      document.getElementById('m2').textContent = m[1];
      document.getElementById('s1').textContent = s[0];
      document.getElementById('s2').textContent = s[1];

      var y = now.getFullYear();
      var mo = pad2(now.getMonth() + 1);
      var d = pad2(now.getDate());
      document.getElementById('clockDate').textContent =
        y + '/' + mo.join('') + '/' + d.join('');
    }

    // initial render
    render(today.getFullYear(), today.getMonth());
    current = new Date(today);
    updateClock();
    setInterval(updateClock, 1000);
  })();
</script>
</body>
</html>
